# checkmake configuration. Rules: https://github.com/checkmake/checkmake
[minphony]
# "all"/"test"/"clean" are not all meaningful yet (no build or test stage in the
# bash phase); revisit once those targets exist.
disabled = true

[maxbodylength]
# Install/uninstall legitimately run several steps with progress echoes.
maxBodyLength = 20

[uniquetargets]
# install/uninstall/install-user/uninstall-user are each defined once per
# $(UNAME) branch (Linux, Darwin, unsupported-fallback) — mutually
# exclusive at make time. checkmake's line scan doesn't evaluate
# ifeq/else, so it can't tell that apart from an accidental duplicate.
ignore = install,uninstall,install-user,uninstall-user
