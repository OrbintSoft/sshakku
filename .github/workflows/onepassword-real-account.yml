name: 1Password service account

on: workflow_dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Only builds and runs the checked-out tree's test suite; no write scopes.
permissions:
  contents: read

jobs:
  real-account-test:
    name: OnePasswordBackend real-account test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-env

      - name: Install the 1Password CLI
        uses: 1Password/install-cli-action@a5215d3a7f75c1629216c465ea9ab3ab399c4b71 # v4.0.0

      - name: Run TestOnePasswordBackendRealAccount
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_TOKEN }}
          SSHAKKU_TEST_ALLOW_REAL_ONEPASSWORD: "1"
        run: go test -count=1 -run OnePasswordBackendRealAccount -v ./internal/keys/...
