name: Tests

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The workflow only builds and runs the checked-out tree's test suite; no
# write scopes.
permissions:
  contents: read

jobs:
  test:
    name: make test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-env

      - name: Ensure dbus-daemon is available
        run: command -v dbus-daemon || (sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends dbus)

      - name: Run make test
        run: make test

  test-macos:
    name: make test (macos)
    runs-on: macos-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-env

      - name: Run make test
        run: make test

      - name: Smoke-test make install/install-user (staged, not the real /etc or $HOME)
        run: test/macos-install-smoke.sh "$RUNNER_TEMP/install-smoke"

  container-test:
    name: make test (container / ${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            dockerfile: test/containers/debian.Dockerfile
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build ${{ matrix.name }} test image
        run: docker build -f ${{ matrix.dockerfile }} -t sshakku-test-${{ matrix.name }} .

      - name: Run make test in ${{ matrix.name }}
        run: docker run --init --rm -v "${{ github.workspace }}":/src:ro -w /src sshakku-test-${{ matrix.name }} make test

      - name: Run make test-bats in ${{ matrix.name }}
        run: docker run --init --rm -e SSHAKKU_TEST_ALLOW_BATS=1 -v "${{ github.workspace }}":/src:ro -w /src sshakku-test-${{ matrix.name }} make test-bats
