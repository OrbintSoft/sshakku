name: Tests

# pull_request lets pr-test-report post/update the test-health PR comment,
# and covers every feature-branch push (a push to an open PR's branch fires
# pull_request, not push). push is scoped to master only, so post-merge
# commits there still get tested without every PR push running twice.
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only by default; pr-test-report grants itself pull-requests: write at
# the job level, the only job that needs to write anything.
permissions:
  contents: read

jobs:
  test:
    name: make test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-env

      - name: Ensure dbus-daemon is available
        run: command -v dbus-daemon || (sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends dbus)

      - name: Run make test-json
        run: make test-json

      - name: Build test-health report
        if: always()
        run: go run ./tools/testreport -os linux -coverprofile=coverage.out < test.json > report-linux.json

      - name: Upload test-health report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-linux
          path: report-linux.json

  test-macos:
    name: make test (macos)
    runs-on: macos-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-env

      - name: Run make test-json
        run: make test-json

      - name: Build test-health report
        if: always()
        run: go run ./tools/testreport -os macos -coverprofile=coverage.out < test.json > report-macos.json

      - name: Upload test-health report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-macos
          path: report-macos.json

      - name: Smoke-test make install/install-user (staged, not the real /etc or $HOME)
        run: test/macos-install-smoke.sh "$RUNNER_TEMP/install-smoke"

  container-test:
    name: make test (container / ${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            dockerfile: test/containers/debian.Dockerfile
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build ${{ matrix.name }} test image
        run: docker build -f ${{ matrix.dockerfile }} -t sshakku-test-${{ matrix.name }} .

      - name: Run make test in ${{ matrix.name }}
        run: docker run --init --rm -v "${{ github.workspace }}":/src:ro -w /src sshakku-test-${{ matrix.name }} make test

      - name: Run make test-bats in ${{ matrix.name }}
        run: docker run --init --rm -e SSHAKKU_TEST_ALLOW_BATS=1 -v "${{ github.workspace }}":/src:ro -w /src sshakku-test-${{ matrix.name }} make test-bats

  pr-test-report:
    name: Post test-health PR comment
    needs: [test, test-macos]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-env

      - name: Download report artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: report-*
          merge-multiple: true

      - name: Render test-health comment
        run: go run ./tools/testreport render report-linux.json report-macos.json > comment.md

      - name: Post or update the PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/post-test-report-comment.sh "${{ github.event.pull_request.number }}" < comment.md
