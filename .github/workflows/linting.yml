name: Linting

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The workflow only reads the checked-out tree to lint it; no write scopes.
permissions:
  contents: read

jobs:
  lint:
    name: make lint
    runs-on: ubuntu-latest
    env:
      SHELLCHECK_VERSION: 0.11.0
      # go install is pinned by full commit hash (mirrors the SHA-pinning
      # used for the third-party actions below); *_VERSION is kept for the
      # cache key and human-readable go install version comments.
      SHFMT_VERSION: 3.13.1
      SHFMT_COMMIT: 879bcfa6d2db958fc385c09f739b3e97c4ae6010
      CHECKMAKE_VERSION: 0.3.2
      CHECKMAKE_COMMIT: 86d946ff9035396c159f305897c204dea0093acf
      ACTIONLINT_VERSION: 1.7.12
      ACTIONLINT_COMMIT: 914e7df21a07ef503a81201c76d2b11c789d3fca
      EDITORCONFIG_CHECKER_VERSION: 3.7.0
      EDITORCONFIG_CHECKER_COMMIT: 03db2cca9a525b3831377be1e4696c06fdfef07a
      GOLANGCI_LINT_VERSION: 2.12.2
      GOLANGCI_LINT_COMMIT: c0d3ddc9cf3faa61a4e378e879ece580256d76e5
      MARKDOWNLINT_CLI2_VERSION: 0.22.1
      TAPLO_CLI_VERSION: 0.7.0
      HADOLINT_VERSION: 2.14.0
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-go-env

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"

      # Keyed on every pinned tool version, so bumping any one of them
      # invalidates the cache instead of silently reusing a stale binary.
      - name: Cache native and Go-installed lint tool binaries
        id: lint-tools-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /usr/local/bin/shellcheck
            /usr/local/bin/hadolint
            ~/go/bin
          key: lint-tools-${{ runner.os }}-shellcheck${{ env.SHELLCHECK_VERSION }}-hadolint${{ env.HADOLINT_VERSION }}-shfmt${{ env.SHFMT_VERSION }}-checkmake${{ env.CHECKMAKE_VERSION }}-actionlint${{ env.ACTIONLINT_VERSION }}-editorconfig-checker${{ env.EDITORCONFIG_CHECKER_VERSION }}-golangci-lint${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install native and Go-installed lint tools
        if: steps.lint-tools-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail

          # Pinned ShellCheck release tarball into /usr/local/bin. Extract under
          # $RUNNER_TEMP so the unpacked tree stays out of the linted workspace.
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" | tar -xJ -C "$RUNNER_TEMP"
          sudo install "${RUNNER_TEMP}/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck

          # Pinned hadolint release binary.
          curl -fsSL -o "${RUNNER_TEMP}/hadolint" "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-linux-x86_64"
          sudo install "${RUNNER_TEMP}/hadolint" /usr/local/bin/hadolint

          # Go-based tools into $(go env GOPATH)/bin, pinned by commit hash.
          go install "mvdan.cc/sh/v3/cmd/shfmt@${SHFMT_COMMIT}" # v${SHFMT_VERSION}
          go install "github.com/checkmake/checkmake/cmd/checkmake@${CHECKMAKE_COMMIT}" # v${CHECKMAKE_VERSION}
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_COMMIT}" # v${ACTIONLINT_VERSION}
          go install "github.com/editorconfig-checker/editorconfig-checker/v3/cmd/editorconfig-checker@${EDITORCONFIG_CHECKER_COMMIT}" # v${EDITORCONFIG_CHECKER_VERSION}
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_COMMIT}" # v${GOLANGCI_LINT_VERSION}

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Node-based lint tools
        run: npm install -g "markdownlint-cli2@${MARKDOWNLINT_CLI2_VERSION}" "@taplo/cli@${TAPLO_CLI_VERSION}"

      - name: Run make lint
        run: make lint
