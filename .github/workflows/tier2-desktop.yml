name: Tier 2 desktop secret stacks

on: workflow_dispatch

# Only builds and runs the checked-out tree's test suite inside a container;
# no write scopes.
permissions:
  contents: read

jobs:
  container-test:
    name: make test (tier2 / ${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: kde
            dockerfile: test/containers/kde-tier2.Dockerfile
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build ${{ matrix.name }} test image
        run: docker build -f ${{ matrix.dockerfile }} -t sshakku-test-tier2-${{ matrix.name }} .

      - name: Run make test in ${{ matrix.name }}
        run: docker run --init --rm -v "${{ github.workspace }}":/src:ro sshakku-test-tier2-${{ matrix.name }} make test
