name: Set up Go
description: >-
  Sets up the pinned Go toolchain used across the project's workflows, so
  the version lives in one place instead of being repeated per workflow.
  Requires the repository to already be checked out (a local composite
  action can only be resolved after checkout runs).

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: "1.25.0"
